<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Table Layout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<table class="table">
  <tr>
    <th colspan="4">TITLE</th>
  </tr>
  
  <tr>
    <th colspan="2">Subtitle</th>
    <th colspan="2">Subtitle</th>
  </tr>
  
  <tr class="item-row first-item">
    <td class="col-text">1 item</td>
    <td class="col-num">123</td>
    <td class="col-text">1 item</td>
    <td class="col-num">123</td>
  </tr>
  
  <tr class="item-row">
    <td class="col-text">1 item</td>
    <td class="col-num">123</td>
    <td class="col-text">1 item</td>
    <td class="col-num">123</td>
  </tr>
  
  <tr class="item-row last-item">
    <td class="col-text">1 item</td>
    <td class="col-num">123</td>
    <td class="col-text">1 item</td>
    <td class="col-num">123</td>
  </tr>
  
  <tr>
    <th colspan="2">Sub Subtitle</th>
    <th colspan="2">Sub Subtitle</th>
  </tr>
</table>

</body>
</html>
